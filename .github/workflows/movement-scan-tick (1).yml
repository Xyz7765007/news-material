# ─────────────────────────────────────────────────────────────────────
# Movement Scan Cron
# Runs every 5 minutes. Hits /api/sidekick/movement-scan-tick which:
#   - returns idle:true if no running scans (0 work, no log row, no cost)
#   - processes one batch (~270s budgeted) if a scan is active
#   - updates the Movement Scan Runs row + writes a Cron Run Log entry
# When the active scan finishes, State flips to 'done' and subsequent
# ticks return idle until a new scan is started.
#
# Required GitHub secrets:
#   - SIGNALSCOPE_URL: https://news-material-two.vercel.app
#   - SIDEKICK_API_KEY: matches the one set on the SignalScope Vercel project
#
# To set: GitHub repo → Settings → Secrets and variables → Actions → New secret
#
# Visibility: every run appears in the Actions tab of the GitHub repo. Each
# run's log shows the JSON response from the tick endpoint (idle vs work).
# ─────────────────────────────────────────────────────────────────────

name: Movement Scan Tick

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (UTC)
  workflow_dispatch:         # allows manual trigger from Actions UI

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 7       # safety; Vercel function caps at 300s + network/setup headroom
    steps:
      - name: Tick movement scan
        env:
          SIGNALSCOPE_URL: ${{ secrets.SIGNALSCOPE_URL }}
          SIDEKICK_API_KEY: ${{ secrets.SIDEKICK_API_KEY }}
        run: |
          if [ -z "$SIGNALSCOPE_URL" ] || [ -z "$SIDEKICK_API_KEY" ]; then
            echo "::error::SIGNALSCOPE_URL or SIDEKICK_API_KEY secrets not set"
            exit 1
          fi

          # POST to the tick endpoint, capturing both body and HTTP status.
          # --max-time 350 gives the Vercel function its full 300s budget
          # PLUS 50s for response transit + GitHub network latency.
          response=$(curl -sS -w "\n__HTTP_STATUS__:%{http_code}" -X POST \
            -H "Authorization: Bearer $SIDEKICK_API_KEY" \
            -H "Content-Type: application/json" \
            "$SIGNALSCOPE_URL/api/sidekick/movement-scan-tick" \
            --max-time 350)

          body=$(echo "$response" | sed 's/__HTTP_STATUS__:[0-9]*$//')
          status=$(echo "$response" | grep -o '__HTTP_STATUS__:[0-9]*' | cut -d: -f2)

          echo "HTTP status: $status"
          echo "Response body:"
          echo "$body" | head -c 5000

          if [ -z "$status" ] || [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Tick failed (HTTP $status)"
            exit 1
          fi

          # Optional: extract idle vs active for nicer log summary
          if echo "$body" | grep -q '"idle":true'; then
            echo "::notice::Tick idle — no active scans"
          else
            echo "::notice::Tick processed a batch"
          fi
